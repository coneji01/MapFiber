<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Fiber node left -->
  <circle cx="16" cy="20" r="5" fill="#00d4ff" stroke="#fff" stroke-width="1.5"/>
  <!-- Fiber node right -->
  <circle cx="48" cy="44" r="5" fill="#00ff88" stroke="#fff" stroke-width="1.5"/>
  <!-- Fiber connection line -->
  <path d="M21,20 C32,12 38,36 48,44" stroke="url(#line)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Center fusion dot -->
  <circle cx="34" cy="28" r="3" fill="#e94560" stroke="#fff" stroke-width="1"/>
  <!-- Manga node center -->
  <rect x="26" y="30" width="16" height="12" rx="3" fill="#533483" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="34" y="39" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="bold">M</text>
</svg>
